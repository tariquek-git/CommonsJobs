name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check & Build
        run: npm run build
        env:
          VITE_PUBLIC_POSTHOG_PROJECT_TOKEN: test
          VITE_PUBLIC_POSTHOG_HOST: https://us.i.posthog.com
          VITE_API_BASE_URL: /api

      - name: Test
        run: npm test
