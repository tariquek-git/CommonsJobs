    <!-- Structured Data -->
    <script type="application/ld+json">
    [
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Fintech Commons",
        "alternateName": "FintechCommons",
        "url": "https://www.fintechcommons.com",
        "description": "Vetted fintech and banking jobs with warm intros. Every role reviewed by a real person — no recruiters, no ghost jobs.",
        "publisher": {
          "@type": "Organization",
          "name": "Fintech Commons",
          "url": "https://www.fintechcommons.com",
          "logo": {
            "@type": "ImageObject",
            "url": "https://www.fintechcommons.com/og-image.png",
            "width": 1200,
            "height": 630
          },
          "sameAs": [
            "https://www.linkedin.com/company/fintech-commons"
          ]
        },
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://www.fintechcommons.com/?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      },
      {
        "@context": "https://schema.org",
        "@type": "EmploymentAgency",
        "name": "Fintech Commons",
        "url": "https://www.fintechcommons.com",
        "description": "Vetted fintech and banking jobs with warm intros.",
        "image": "https://www.fintechcommons.com/og-image.png",
        "priceRange": "Free",
        "areaServed": {
          "@type": "Place",
          "name": "Worldwide"
        },
        "serviceType": "Fintech Job Board"
      }
    ]
