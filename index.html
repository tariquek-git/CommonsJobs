<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Commons Jobs — Community-reviewed fintech & banking roles. Real talk about the job, not corporate fluff." />
    <title>Commons Jobs</title>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Commons Jobs — Fintech Jobs, Humanized" />
    <meta property="og:description" content="Community-reviewed fintech & banking roles. Real talk about the job, not corporate fluff." />
    <meta property="og:image" content="/og-image.svg" />
    <meta property="og:url" content="https://commonsjobs.com" />
    <meta property="og:site_name" content="Commons Jobs" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Commons Jobs — Fintech Jobs, Humanized" />
    <meta name="twitter:description" content="Community-reviewed fintech & banking roles. Real talk about the job, not corporate fluff." />
    <meta name="twitter:image" content="/og-image.svg" />
    <script>
      // Prevent flash of wrong theme
      (function() {
        const theme = localStorage.getItem('theme');
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body class="bg-gray-50 text-gray-900 dark:bg-navy-950 dark:text-gray-100 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
