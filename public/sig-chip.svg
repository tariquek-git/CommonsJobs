<svg xmlns="http://www.w3.org/2000/svg" width="28" height="22" viewBox="0 0 28 22" fill="none">
  <!-- Card body -->
  <rect x="0.5" y="0.5" width="27" height="21" rx="3" fill="#635BFF" stroke="#8B5CF6" stroke-width="0.5" opacity="0.12"/>
  <!-- Chip body -->
  <rect x="8" y="5" width="12" height="12" rx="2" fill="url(#chipGrad)" stroke="#635BFF" stroke-width="0.6"/>
  <!-- Chip lines - horizontal -->
  <line x1="8" y1="9" x2="20" y2="9" stroke="#635BFF" stroke-width="0.4" opacity="0.5"/>
  <line x1="8" y1="13" x2="20" y2="13" stroke="#635BFF" stroke-width="0.4" opacity="0.5"/>
  <!-- Chip lines - vertical -->
  <line x1="12" y1="5" x2="12" y2="17" stroke="#635BFF" stroke-width="0.4" opacity="0.5"/>
  <line x1="16" y1="5" x2="16" y2="17" stroke="#635BFF" stroke-width="0.4" opacity="0.5"/>
  <!-- Contactless waves -->
  <path d="M22 7.5c1.2 1 1.2 3 0 4" stroke="#635BFF" stroke-width="0.7" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M24 6c2 1.8 2 5.2 0 7" stroke="#635BFF" stroke-width="0.7" stroke-linecap="round" fill="none" opacity="0.4"/>
  <defs>
    <linearGradient id="chipGrad" x1="8" y1="5" x2="20" y2="17" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E8E6FF"/>
      <stop offset="100%" stop-color="#D4D0FF"/>
    </linearGradient>
  </defs>
</svg>
